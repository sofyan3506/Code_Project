<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar">
    <div class="top-bar__left">
      <div id="datetime" class="datetime"></div>
      <!-- Greeting Icon Dinamis + teks -->
      <div class="greeting-row">
        <span id="greetingIcon" class="greeting-icon">🌅</span>
        <div id="greeting" class="greeting"></div>
      </div>
    </div>
    <div class="top-bar__right">
      <button id="themeToggle" class="btn-icon" title="Toggle light / dark mode" aria-label="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ===== RANDOM QUOTE BAR ===== -->
  <div class="quote-bar">
    <span id="quoteText" class="quote-text"></span>
    <button id="quoteRefresh" class="btn-icon btn-icon--xs" title="New quote" aria-label="New quote">🔄</button>
  </div>

  <!-- ===== XP / LEVEL BAR ===== -->
  <div class="xp-bar-container">
    <div class="xp-bar-header">
      <span id="xpLevel" class="xp-level">Novice Coder</span>
      <span id="xpScore" class="xp-score">0 XP</span>
    </div>
    <div class="xp-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="xpTrack">
      <div id="xpFill" class="xp-bar-fill"></div>
    </div>
    <!-- Focus Streak Counter -->
    <div class="streak-row">
      <span class="streak-label">🔥 Focus Streak today:</span>
      <span id="streakCount" class="streak-count">0</span>
    </div>
  </div>

  <!-- ===== NAME MODAL ===== -->
  <div id="nameModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
    <div class="modal">
      <h2 id="nameModalTitle">Welcome! 👋</h2>
      <p>What should I call you?</p>
      <input id="nameInput" class="input" type="text" placeholder="Your name" maxlength="40" />
      <button id="nameSaveBtn" class="btn btn--primary">Let's go</button>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="dashboard">

    <!-- ── FOCUS TIMER ── -->
    <section class="card timer-card" aria-labelledby="timerHeading">
      <h2 id="timerHeading" class="card__title">Focus Timer</h2>

      <div class="timer__display" id="timerDisplay" aria-live="polite">25:00</div>

      <div class="timer__controls">
        <button id="timerStart" class="btn btn--primary">Start</button>
        <button id="timerStop"  class="btn btn--secondary">Stop</button>
        <button id="timerReset" class="btn btn--ghost">Reset</button>
      </div>

      <!-- Custom duration: Hours / Minutes / Seconds -->
      <div class="timer__settings">
        <label for="timerHour" class="label">Hour</label>
        <input id="timerHour" class="input input--sm" type="number" min="0" max="23" value="0" />

        <label for="timerMinutes" class="label">Minutes:</label>
        <input id="timerMinutes" class="input input--sm" type="number" min="0" max="59" value="25" />

        <label for="timerSecs" class="label">Seconds</label>
        <input id="timerSecs" class="input input--sm" type="number" min="0" max="59" value="0" />

        <button id="timerSetDuration" class="btn btn--ghost btn--sm">Set</button>
      </div>
    </section>

    <!-- ── TO-DO LIST ── -->
    <section class="card todo-card" aria-labelledby="todoHeading">
      <h2 id="todoHeading" class="card__title">To-Do List</h2>

      <!-- Task Counter Dinamis -->
      <div id="todoCounter" class="todo__counter" aria-live="polite">Tugas Aktif: 0 | Selesai: 0</div>

      <!-- Add task form with priority & due date -->
      <form id="todoForm" class="todo__form-extended">
        <div class="todo__form-row">
          <input id="todoInput" class="input" type="text" placeholder="Add a new task…" maxlength="200" required />
          <button type="submit" class="btn btn--primary">Add</button>
        </div>
        <div class="todo__form-row todo__form-meta">
          <!-- Priority selector -->
          <div class="priority-select-wrap">
            <label for="todoPriority" class="label">Priority</label>
            <select id="todoPriority" class="input input--sm select--priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <!-- Due date/time -->
          <div class="due-select-wrap">
            <label for="todoDue" class="label">Due</label>
            <input id="todoDue" class="input input--sm" type="datetime-local" />
          </div>
        </div>
      </form>

      <!-- Clear completed button -->
      <div class="todo__toolbar">
        <button id="clearCompletedBtn" class="btn btn--ghost btn--sm btn--danger-ghost">🗑 Clear Completed</button>
      </div>

      <ul id="todoList" class="todo__list" aria-label="Task list"></ul>
      <p id="todoEmpty" class="todo__empty hidden">No tasks yet. Add one above!</p>
    </section>

    <!-- ── QUICK LINKS ── -->
    <section class="card links-card" aria-labelledby="linksHeading">
      <h2 id="linksHeading" class="card__title">Quick Links</h2>

      <form id="linkForm" class="links__form">
        <input id="linkName" class="input" type="text"  placeholder="Label (e.g. GitHub)" maxlength="30" required />
        <input id="linkUrl"  class="input" type="url"   placeholder="https://…" required />
        <button type="submit" class="btn btn--primary">Add</button>
      </form>

      <div id="linksList" class="links__grid" aria-label="Quick links"></div>
      <p id="linksEmpty" class="links__empty hidden">No links yet. Add one above!</p>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
